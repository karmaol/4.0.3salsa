// Pre-TPU transaction stream served by the validator (harmonic-scheduler) while
// it is the leader. The co-located strategy server connects as the client and
// subscribes to the leader's own incoming (non-vote) transactions. This is a
// one-way stream: it does not accept transactions back.
syntax = "proto3";

package backrun;

import "google/protobuf/timestamp.proto";

message TransactionMessage {
  bytes content = 1;
}

message SubscribeUpdatePing {}

message SubscribeBackrunsRequest {}

message SubscribeBackrunsResponse {
  google.protobuf.Timestamp ts = 1;
  oneof update_oneof {
    TransactionMessage transaction = 2;
    SubscribeUpdatePing ping = 3;
  }
}

service BackrunService {
  rpc SubscribeBackruns(stream SubscribeBackrunsRequest) returns (stream SubscribeBackrunsResponse) {}
}
