// Backrun streaming interface served by the validator (harmonic-scheduler) while
// it is the leader. The co-located strategy server (searcher-client-example)
// connects as the client: it subscribes to the leader's incoming transactions
// and sends back backrun bundles to be included in the block.
syntax = "proto3";

package backrun;

import "google/protobuf/timestamp.proto";

message TransactionMessage {
  bytes content = 1;
}

message SendBundleRequest {
  repeated TransactionMessage transactions = 1;
  bool use_swqos = 2;
}

message SubscribeUpdatePing {}

message SendBundleResponse {
  string uuid = 1;
}

message SubscribeBackrunsRequest {}

message SubscribeBackrunsResponse {
  google.protobuf.Timestamp ts = 1;
  oneof update_oneof {
    TransactionMessage transaction = 2;
    SubscribeUpdatePing ping = 3;
  }
}

service BackrunService {
  rpc SendBundle(SendBundleRequest) returns (SendBundleResponse) {}
  rpc SubscribeBackruns(stream SubscribeBackrunsRequest) returns (stream SubscribeBackrunsResponse) {}
}
